# Minimal mcpwarden configuration: proxy a single upstream MCP server.
#
# Run the gateway with:
#   mcpwarden run --config examples/minimal/mcpwarden.yaml
#
# Then point your agent at the `mcpwarden` command instead of at the
# filesystem server directly.

upstreams:
  files:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
